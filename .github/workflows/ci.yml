name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang clang-tidy ninja-build \
            libssl-dev

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev --parallel

      - name: Test
        run: ctest --preset dev

  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang clang-tidy ninja-build \
            libssl-dev

      - name: Configure
        run: cmake --preset asan

      - name: Build
        run: cmake --build --preset asan --parallel

      - name: Test
        run: ctest --preset asan

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang clang-tidy ninja-build \
            libssl-dev lcov

      - name: Configure
        run: cmake --preset coverage

      - name: Build
        run: cmake --build --preset coverage --parallel

      - name: Test
        run: ctest --preset coverage

      - name: Generate coverage report
        run: |
          lcov --capture \
               --directory build-coverage \
               --output-file coverage.info \
               --ignore-errors mismatch
          lcov --remove coverage.info \
               '*/test/*' '*/_deps/*' '/usr/*' \
               --output-file coverage_filtered.info
          lcov --list coverage_filtered.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_filtered.info

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang clang-tidy ninja-build \
            libssl-dev

      - name: Configure
        run: cmake --preset bench

      - name: Build
        run: cmake --build --preset bench --parallel

      - name: Run
        run: ./build-bench/benchmark/benchmark
